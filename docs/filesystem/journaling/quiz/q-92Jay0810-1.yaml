author: 92Jay0810
date: 2026-04-24
question: |
  為了提升效能，現代具備日誌功能（Journaling）的檔案系統（例如 ext4）不會為每一個微小的操作獨立寫入日誌，而是將一段時間內的多個操作打包成一個全域的「交易（Transaction）」。

  假設在一個採用 **Ordered Journaling** 模式的系統中，目前的 Transaction 10 包含了兩個獨立的邏輯操作：
  1. 建立新檔案 A（配置了新的 Inode 與 Data Block）。
  2. 刪除舊檔案 B（釋放了其 Inode 與 Data Block）。

  系統在將 Transaction 10 的內容寫入磁碟的日誌區時發生了無預警斷電。經過查核，該交易的 Metadata 已經寫入日誌區，但在寫入最後一個 **Commit Block** 時被中斷（Commit Block 未完整落盤）。
  當系統重啟並執行日誌重播（Journal Replay）後，檔案 A 與檔案 B 的最終狀態為何？

options:
  - text: "檔案 A 已經建立，但檔案 B 尚未被刪除。"
    explanation: |
      這誤解了批次處理的機制。
      日誌系統並不會「部分恢復」一個未完成的交易。即使檔案 A 的 Metadata 已經提早寫入日誌區，缺少了 Commit Block 的背書，系統重播時就會忽略這整段紀錄。

  - text: "檔案 A 不存在，檔案 B 依然存在。"
    correct: true
    explanation: |
      交易（Transaction）在日誌系統中具有不可分割的原子性（Atomicity）。
      只要最後的 Commit Block 沒有完整寫入磁碟，整個 Transaction 10 都會被視為無效並被直接丟棄。因此，包含在該交易中的所有操作都不會生效，系統狀態會回退到該交易發生前。

  - text: "檔案 A 已經建立，且檔案 B 已經被刪除。"
    explanation: |
      檔案系統無法預測未完成的 Commit Block 之後是否還有遺漏的資料。
      基於 Crash Consistency 的安全原則，對於未提交（Uncommitted）的交易，系統只能選擇放棄（Abort），絕不會強行完成（Force Commit），否則極可能導致更嚴重的結構損壞。

  - text: "由於是 Ordered Journaling 模式，檔案 A 會存在但內容為空，檔案 B 則維持原狀。"
    explanation: |
      雖然 Ordered 模式會強制先寫入 Data 再寫入 Metadata，但這只保證了「若交易成功提交，檔案內不會讀到舊的垃圾資料」。
      對於整個交易的原子性判斷，所有日誌模式都嚴格依賴 Commit Block 的完整性；若未成功提交，整個交易就是全盤作廢。