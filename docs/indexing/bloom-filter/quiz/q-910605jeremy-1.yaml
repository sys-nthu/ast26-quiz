author: 910605jeremy
date: 2026-03-29
question: |
  在 Bloom Filter 中，假設位元陣列大小 $m$ 與插入元素數量 $n$ 固定。當我們不斷增加雜湊函數的數量 $k$ 時，下列關於系統表現的敘述何者最準確？
options:
  - text: "False Positive Rate 會先下降後上升。其背後的物理意義是：較小的 $k$ 導致雜湊組合能力不足（碰撞多），而較大的 $k$ 則導致位元陣列過於擁擠（1 太多）。"
    correct: true
    explanation: |
      當 $k$ 較小時，雖然位元陣列很空（1 少），但因為檢查點太少，容易發生隨機碰撞。當 $k$ 較大時，每個元素標記過多位元，導致位元陣列中 1 的密度過高（趨近飽和），查詢時所有位元都命中 1 的機率反而上升。
  - text: "False Positive Rate 會隨著 $k$ 的增加而遞減，因為更多的雜湊函數代表更強的唯一性檢查。"
    explanation: |
      當 $k$ 增加，位元陣列被填滿的速度也會加快，最終導致任何查詢都會撞到已設為 1 的位元。
  - text: "增加 $k$ 會導致『查詢操作』的計算開銷增加，但由於位元陣列大小 $m$ 不變，因此對 CPU cache locality 沒有影響。"
    explanation: |
      Bloom Filter 的 $k$ 個雜湊位置通常是隨機分佈在整個 $m$ 空間中。增加 $k$ 代表單次查詢需要訪問更多不連續的記憶體位址，這會增加 Cache Miss 的次數，降低實際運行速度。
  - text: "若 $k$ 增加到讓位元陣列中 1 的比例達到 100%，則 Bloom Filter 會開始產生 False Negative。"
    explanation: |
      Bloom Filter 在任何情況下都絕對不會產生 False Negative。即使位元陣列全部變成 1，它的表現只是會對所有查詢回傳「可能存在」，但絕對不會把「原本存在」的元素誤判為「不存在」。
