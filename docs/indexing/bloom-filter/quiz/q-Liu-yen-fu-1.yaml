author: Liu-yen-fu
date: 2026-03-30
question: |
  一個基於 LSM Tree 的 key-value store ，對每個 SSTable 量身打造 Bloom Filter（ FPR = 1% ）。  
  查詢時會從最新到最舊依序檢查 SSTable ：  
  
  - 若 Bloom Filter 判定「不存在」則跳過該 SSTable
  - 若判定「可能存在」則讀取該 SSTable
  
  某次分析發現：  
  對於某些實際只寫入過最新 SSTable 的 key ，查詢過程中卻會觸發對多個舊 SSTable 的實際讀取，因為 Bloom Filter 判定可能存在。  
  
  以下哪一個解釋最合理？
options:
  - text: "每個 SSTable 的 Bloom Filter 是獨立建立的，即使 key 不存在於舊 SSTable，也可能各自發生 false positive，導致查詢路徑中出現多次不必要的 SSTable 存取"
    correct: true
    explanation: |
      每個 SSTable 的 Bloom Filter 是獨立的隨機過程。即便 FPR 只有 1%，在查詢多個不含該 Key 的 SSTable 時，每一層都有 1% 的機率發生誤判。若 SSTable 數量很多，發生「多次」誤判是合理的統計結果。
  - text: "為了保證效率，系統通常會對所有 SSTable 採用相同的 hash 算法，使得不同 filter 對同一 key 的原始 hash 值是相同的，進而導致同一 key 一定會命中所有 Bloom Filter；若這些 bit 在舊 SSTable 中剛好被其他 key 設為 1，就會導致跨多個 SSTable 的誤判"
    explanation: |
      即使不同 Bloom Filter 使用相同 hash functions ， bit array 也未必相同。如果 bit array 的長度 m 不相同，同一個 key 就不保證會在所有 Bloom Filter 中都命中。  
      另外，Bloom Filter 會命中（回報可能存在），是因為該位置被 「其他 Key 」 剛好也 Hash 到同一個位置並設成了 1  
  - text: "因為最新 SSTable 刪除了該 key 又進行過了 compaction 一次，而 Bloom Filter 會保留歷史資訊，因此仍然會命中這些舊的 SSTable  "
    explanation: |
      即使最新層級寫入一個「刪除標記」（Tombstone）並進行 Compaction 產生新的 SSTable 時，舊層級的 Bloom Filter 是否命中，完全取決於舊層級當初建立時裡面放了什麼，跟「現在最新層級刪除了它」毫無因果關係。  
  - text: "當 Bloom Filter 的 FPR 為 1% 時，系統應保證每次查詢最多只會發生一次 false positive ；若出現多次，代表 Bloom Filter 已經過度飽和"
    explanation: |
      False Positive Rate 是機率期望值，而非硬性硬體限制。每次查詢都是獨立事件。  
