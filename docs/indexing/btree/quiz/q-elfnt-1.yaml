author: elfnt
date: 2026-04-01
question: |
  一個電商平台的訂單資料庫有 1000 萬筆資料，在 `order_id`（依訂單時間遞增的整數）上建了一棵 B+Tree（fan-out 500，樹高 3 層，上層 inner node 常駐 cache，並且有 buffer pool 可以快取近期的 disk I/O）。

  以下四種查詢操作同時存在於這個系統中，請將它們依照此 B+Tree 能**發揮的效益**由**高到低**排列。

  - $P$：促銷活動期間，系統每秒重複查詢同一批約 200 個熱門商品的最新訂單（同樣的 order_id 反覆出現）。
  - $Q$：客服系統查詢某個客戶過去一小時的訂單，範圍約 100 筆。
  - $R$：財務部門每月底跑一次全表報表，掃描所有 1000 萬筆訂單計算營收。
  - $S$：反詐騙系統每秒隨機抽查數千筆分散在全域的訂單，每筆 order_id 都不同。
options:
  - text: "$P > Q > S > R$"
    correct: true
    explanation: |
      - $P$（最高）：同樣的 order_id 反覆查詢，目標 leaf node 很快就會常駐在 buffer pool cache 中，之後的查詢連 disk I/O 都省掉，幾乎全部在記憶體完成。B+Tree 的 cache 效果在這裡被放到最大。
      - $Q$（次高）：小範圍 range query，B+Tree 先定位到起點 leaf node（上層在 cache，只需 1 次 disk I/O），再沿 linked list 掃幾個 leaf node 就結束，disk I/O 極少，效益很高。
      - $S$（次低）：每次 order_id 都不同且分散，上層 inner node 在 cache，但目標 leaf node 每次都不同，cache hit rate 極低，幾乎每次都需要 1 次 disk I/O。B+Tree 相比 BST 等結構仍然有效，但幫助不顯著。
      - $R$（最低）：幾乎掃過全部 1000 萬筆資料，B+Tree 定位起點的優勢完全被稀釋，和 full table scan 成本相當，index 的存在幾乎沒有幫助，反而多了 inner node traversal 的 overhead。
  - text: "$P > R > Q > S$"
    explanation: |
      Check the correct answer to see the explanation.
  - text: "$S > Q > P > R$"
    explanation: |
      Check the correct answer to see the explanation.
