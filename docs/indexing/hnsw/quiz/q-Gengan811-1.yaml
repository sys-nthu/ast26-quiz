author: Gengan811
date: '2026-05-03'
question: |
  某新創團隊正在開發一款以圖形結構（Graph-based）為基礎的近似最近鄰（ANN）向量搜尋引擎。初階工程師提案：「我們只需要建構一層 NSW（Navigable Small World）圖，並透過貪婪導航（Greedy Routing）就能找到最近鄰居，根本不需要實作複雜的『階層化（Hierarchical）』架構，這樣可以省下大量的記憶體與建表時間。」
  
  根據 HNSW（Hierarchical Navigable Small World）的演算法設計原理，如果資料庫中包含數十億筆高維度向量，這位工程師的「單層 NSW」提案會在搜尋階段遭遇什麼最嚴重的效能瓶頸？
options:
  - text: "在資料量極大時，單層的 NSW 圖會變得過度擁擠（Dense），導致平均的連線長度（Edge length）變短。當從隨機起點開始進行貪婪導航時，搜尋路徑會被迫在大量密集的短連線中漫遊，無法快速跨越巨大的向量空間，導致搜尋時間大幅增加。HNSW 透過分層架構（頂層節點少、連線長），提供了類似「高速公路」的長程跳躍能力，這正是單層 NSW 無法做到的。"
    correct: true
    explanation: |
      這是正確的。根據講義，單層的 NSW 在面對海量節點時，圖結構會變得極度密集。貪婪導航在這種圖中，就像是在沒有國道的世界裡開車跨國，只能在無數個短距離的鄉間小路中穿梭，複雜度高昂且容易陷入局部最佳解（Local optimum）。HNSW 借鑑了 Skip List 的概念，在頂層建立長連線（Long-range links），讓演算法能以 $O(\log N)$ 的對數時間複雜度快速逼近目標區域，再逐層下降進行精確搜尋，這是 HNSW 能在數十億規模下保持毫秒級延遲的關鍵。
  - text: "單層的 NSW 無法支援餘弦相似度（Cosine Similarity）的計算，只能使用歐氏距離（Euclidean Distance）。因為餘弦相似度需要計算向量的角度，必須依靠 HNSW 的多層架構將角度資訊分散到不同的維度層級中才能進行運算。"
    explanation: |
      這是錯誤的觀念。無論是 NSW 還是 HNSW，它們都是「資料結構與搜尋策略」，與底層用來計算距離的「度量函數（Distance Metric）」無關。單層的 NSW 完全可以支援餘弦相似度、內積（Inner Product）或歐氏距離的計算，分層架構並不是為了解決度量函數的限制。
  - text: "單層的 NSW 在建表時，會因為圖形缺乏階層約束，導致所有的節點最終都只會連結到同一個中心點（Hub node），形成星狀拓樸（Star topology）。這會導致貪婪導航在第一步就卡死在中心點，無法繼續往外搜尋。"
    explanation: |
      這是對 NSW 建圖機制的誤解。NSW 在建構時會依照機率與距離法則連線，雖然會形成某些連線較多的 Hub nodes，但這正是 Small World 網路「六度分隔」特性的優勢，並不會極端到所有節點都只連向同一個中心點而導致導航卡死。單層 NSW 的真正問題是缺乏「長程跳躍」能力，而非形成星狀拓樸。
  - text: "單層的 NSW 為了確保貪婪導航絕對能找到「精確」的最佳解（100% Accuracy），在搜尋時必須強制遍歷圖中超過一半以上的節點，這會導致搜尋複雜度退化回暴力搜尋（Brute-force）的 $O(N)$ 級別。HNSW 分層的目的就是為了放棄精確度以換取速度。"
    explanation: |
      這混淆了 ANN 的本質。不管是 NSW 還是 HNSW，它們都是「近似（Approximate）」搜尋演算法，本來就不保證 100% 找到精確解。單層的 NSW 在使用 Greedy Routing 時並不會強制遍歷一半以上的節點，它依然會在其能力範圍內提早停止，只是因為缺乏頂層的長程連線，導致它在抵達終點前需要經過的「跳躍次數（Hops）」過多，效能低落。
