author: ZMYsamuel
date: 2026-04-24
question: |
  HNSW 在查詢時會從最上層的 entry point 出發，逐層往下走到目標附近。上層節點稀疏，連線通常跨越較大距離，扮演「跨區域捷徑」的角色，把搜尋快速帶到目標所在的區域。如果上層的這些跨區域連線偏向某些區域，落在其他區域的查詢就需要更多次跳轉才能走到，在固定 `efSearch` 下容易提早終止而漏掉真正的最近鄰。

  同一批 128 維 embedding（共 3000 萬筆），團隊用完全相同的 HNSW 參數建了兩個 index：
  `M = 16`、`efConstruction = 300`、距離函數相同、每個節點層級都依同一個隨機機制抽樣。

  差別只有插入順序：
  1. index A：依資料到達時間插入，早期資料幾乎都來自同一個熱門類別。
  2. index B：先全量打散（shuffle）後再插入。

  線上查詢時，`efSearch` 相同。實測發現 index B 在冷門類別（出現頻率很低、在資料集中佔比很小的類別）的 recall 明顯比較高。
  下列哪個解釋最合理？
options:
  - text: "index A 的問題主要是因為早期節點一定會被分配到更高層，所以高層路徑被熱門類別壟斷；index B 打散後才讓高層分布變平均。"
    explanation: |
      層級分配與插入順序是兩個獨立機制：層級由獨立隨機抽樣決定，與插入早晚無關；插入順序則影響每一層內連線的形成歷程。
  - text: "index A 與 index B 的 recall 差異，通常來自插入順序改變了跨區域連線的形成歷程；早期節點在圖還稀疏時容易形成較長的跨區域連線，若早期資料分布偏斜，整體路徑可能對某些區域有偏置。"
    correct: true
    explanation: |
      即使層級抽樣機制相同，圖的連線是在插入過程中逐步建立。
      當早期資料集中在少數區域時，先形成的跨區域連線與上層跨區域捷徑可能偏向該區域。
      先打散再建圖，通常能讓不同區域更早參與連線形成，改善冷門類別被找到的機率。
  - text: "兩者差異是因為 index B 的 `efSearch` 等效變大；只要插入順序夠隨機，搜尋時就會自動探索更多候選點。"
    explanation: |
      `efSearch` 是查詢期明確設定的 beam width，不會因為插入順序自動放大。
      插入順序可能改變圖品質，但不會改變查詢演算法一次保留多少候選點。
  - text: "只要 `M` 不變，圖的拓樸就近似固定；插入順序對最終 recall 幾乎沒有影響，觀測差異多半只是量測噪音。"
    explanation: |
      `M` 只限制每層最大連接數，無法唯一決定最後會連到哪些鄰居。
      在增量建圖過程中，插入順序會影響鄰居被選中的歷程與修剪結果，因此可能實質影響 recall。
