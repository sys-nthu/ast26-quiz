author: Jia-Sheng-Yang
date: 2026-04-02
question: |
 一位資料工程師正在調校一個基於 LSM-tree 的儲存引擎，工程師注意到，隨著資料量增長以及 LSM-tree 層數的增加，Read Amplification 成為了瓶頸，導致讀取必須多次存取磁碟。
 為了改善此問題，工程師實施了以下兩項變更：
 1.為磁碟上的每個 SSTable 附加一個 Bloom Filter。
 2.將「Size-Tiered Compaction Strategy」切換為「Leveled Compaction Strategy」。
 這兩項優化如何具體影響系統中不同類型的「Amplification」？
options:
  - text: "Bloom Filters 透過允許系統跳過不包含該 key 的 SSTables 來減少 Read Amplification；而 Leveled Compaction 減少了 Read Amplification，但增加了 Write Amplification。"
    correct: true
    explanation: |
      Bloom Filter： 透過機率性的過濾，引擎可以跳過肯定不包含目標資料的 SSTable，減少不必要的磁碟 I/O（Read Amplification 下降）。Leveled Compaction： 雖然它保持每層 SSTable 的 key range 不重疊、讀取更快（Read Amplification 較少），但為了維持這種嚴格的結構，系統必須更頻繁地執行合併與重寫，這會導致資料重複寫入磁碟的次數增加（Write Amplification 較大）。
  - text: "Bloom Filters 透過在記憶體中批次更新索引來減少 Write Amplification，而 Leveled Compaction 減少了 Space Amplification，但代價是顯著增加了 Read Amplification。"
    explanation: |
      Bloom Filter： 它主要用來判斷某個 key 是否「不在」磁碟中，因此它減少的是 Read Amplification，而非 Write Amplification。
      Leveled Compaction： 這種策略可以優化搜尋速度 （詳見選項一的解釋）。所以它會「減少」Read Amplification，選項中說它會增加是錯誤的。
  - text: "Bloom Filters 增加了 Space Amplification，因為它們儲存了實際 keys 的副本；而 Leveled Compaction 透過將所有層級合併為單一 Page 來消除 Write Amplification。"
    explanation: |
      Bloom Filter： 它儲存的是 key 的 hash 映射位元，並非 key 的原始副本，因此它的空間佔用非常小。
      Compaction： 無論哪種 Compaction 策略都會涉及資料的讀取再寫入，這是造成 Write Amplification 的主要原因，絕對不可能「消除」它。
  - text: "Bloom Filters 減少了 Write Amplification，因為它們減少了 MemTable 必須執行 flush 的次數；而 Leveled Compaction 減少了 Read Amplification，且不會影響 CPU 或 I/O 負載。"
    explanation: |
      Bloom Filter： 它發生在讀取階段。而 MemTable 寫入滿了之後執行 flush（轉存為磁碟上的 SSTable）是寫入路徑的操作，兩者互不干擾
      Leveled Compaction： 這種策略雖然對讀取友善，但其合併（merge）過程非常消耗 CPU 運算資源與 I/O 頻寬，並非沒有影響。