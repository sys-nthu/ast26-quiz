author: Gengan811
date: '2026-05-03'
question: |
  某團隊使用 Product Quantization（PQ）將 1024 維的浮點數向量壓縮成 128 個位元組（bytes）的 ID 陣列。當接收到一個未經壓縮的查詢向量 q 時，系統需要計算 q 與資料庫中已壓縮向量 x 的距離。
  
  請問 PQ 演算法是如何在「不解壓縮 x」的前提下，極速完成距離計算的？
options:
  - text: "PQ 使用非對稱距離計算（Asymmetric Distance Computation，ADC）。系統會先預先計算查詢向量 q 各個子空間與密碼本（codebook）中所有中心點的距離，建立一張距離查找表（distance table）。接著，只需根據 x 儲存的 ID，從表中查出對應的距離並相加即可，將沉重的乘法運算轉化為極速的陣列查表（array lookups）。"
    correct: true
    explanation: |
      這是正確的。ADC 是 PQ 演算法能同時兼顧「高壓縮比」與「極速搜尋」的核心魔法。它不需要把資料庫的 ID 還原成浮點數，而是針對進來的 query 預先建好 table。之後面對幾百萬筆壓縮向量時，CPU 只需要做簡單的記憶體查表與加法，大幅降低了運算複雜度。
  - text: "系統會將查詢向量 q 也進行 PQ 壓縮轉換成 ID 陣列，然後直接計算 q 與 x 兩個 ID 陣列之間的漢明距離（Hamming distance）。這被稱為對稱距離計算（SDC），速度最快且精確度完全不流失。"
    explanation: |
      這是錯誤的觀念。首先，將 q 也壓縮會造成二次失真（二次量化誤差）。其次，PQ 壓縮出來的 ID 只是中心點的「索引編號（index）」，編號 1 和編號 2 的中心點在實際空間中不一定相鄰，因此直接對 ID 陣列算漢明距離是毫無數學意義的。
  - text: "PQ 依賴現代 CPU 的 AVX-512 硬體指令集，直接將 128 個 8-bit 的 ID 丟入特殊暫存器中與查詢向量 q 進行點積（dot product）運算，完全繞過了查表與解壓縮的步驟。"
    explanation: |
      這是錯誤的。雖然現代系統確實會用 SIMD 來加速運算，但演算法本質不可能直接拿「索引 ID」跟「浮點數向量」做點積運算。必須要知道該 ID 對應的中心點真實座標（或是先建好距離查找表），才能進行有意義的空間距離計算。
  - text: "系統只會取向量 x 的前 4 個 ID 作為整體特徵代表，並計算查詢向量 q 與這 4 個中心點的距離。這種截斷策略（truncation）雖然會犧牲部分精確度，但能換取 O(1) 的極致運算時間。"
    explanation: |
      這是對 PQ 切割機制（chunking）的誤解。PQ 會將 1024 維切成多個子空間（例如 128 段），在計算距離時，必須把這 128 段子空間的距離全部查表並加總，才能得到正確的近似距離，不可能只取前幾個 ID 來代表整體的超高維向量。
