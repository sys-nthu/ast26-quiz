author: lin131chen
date: 2026-05-11
question: |
  你在準備使用 PQ 來建立千萬等級影像的索引。在訓練碼本（Codebook）的階段，為了節省運算時間，只從資料庫中隨機抽取了「純文字掃描檔」的特徵向量來進行 K-means 分群訓練。當系統上線，並被使用者用來搜尋「戶外風景照」時，最有可能發生什麼情況？
options:
  - text: "搜尋速度會變得極慢，因為戶外風景照的特徵無法對應到文字檔的碼本。"
    explanation: |
      PQ 的搜尋速度主要取決於「查表（Look-up）」與「距離相加」的過程，這部分的計算複雜度是固定的。無論資料分佈是否匹配，系統一樣會硬把風景照映射到最近的群集中心並計算距離，因此搜尋速度不會變慢，只是找出來的結果會是錯的。
  - text: "系統會自動啟動對稱距離計算（SDC）來彌補誤差，因此準確度不受影響。"
    explanation: |
      對稱距離計算（SDC）會將 Query 向量也進行壓縮，這反而會引入更多的誤差，通常準確度比非對稱距離計算 (ADC) 更低。此外，系統不會因為底層訓練不良就自動切換計算模式來彌補誤差。
  - text: "搜尋準確度會大幅下降，因為碼本的群集中心無法有效代表戶外風景照的特徵分佈，導致量化誤差（Quantization Error）極大。"
    correct: true
    explanation: |
      PQ 是依賴 K-means 訓練出來的「群集中心」來近似原始資料。如果訓練資料（文字檔）和實際查詢資料（風景照）的特徵差異太大，訓練出來的群集中心就無法準確代表風景照的特徵。這會產生極大的「量化誤差」，導致搜尋準確度大幅下降。
  - text: "只要子空間數量（m）設定得夠大，不管用什麼資料訓練碼本，都能完美還原特徵，因此沒有負面影響。"
    explanation: |
      增加子空間數量 (m) 確實能讓特徵切割得更精細。但是，如果訓練資料和實際資料差異過大，導致底層的碼本（群集中心）本身就是偏差的，那麼即使切分得再細，也無法修正根本的誤差，搜尋結果依然會很不準確。
