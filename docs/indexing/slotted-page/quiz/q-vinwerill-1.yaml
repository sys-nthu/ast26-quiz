author: vinwerill  
date: 2026-04-01  
question: |
  在資料庫系統中，Slotted Page 結構通常被用於管理頁面內的記錄（records）。請問在以下四種理由中，哪一個最能解釋「何種類型的資料最適合使用 Slotted Page 結構」？  
options:  
  - text: "**商品描述 或 使用者備註**，通常是可變長文字欄位。"  
    correct: true  
    explanation: |
      Slotted Page 透過 slot table 管理每個記錄的起始位置與長度，非常適合這類變長欄位資料。它能有效利用頁面空間，避免內部碎片，並方便在頁面內進行插入、刪除 或 更新操作。  

  - text: "**訂單編號 或 會員 ID**，固定長度整數欄位。"  
    explanation: |
      這類固定長度欄位資料可直接用連續陣列儲存，不需要 slot table 管理，因此使用 Slotted Page 的效益不大。  

  - text: "**產品規格 或 價格列表**，欄位長度通常固定 或 變化不大，例如尺寸、顏色、價格欄位。"  
    explanation: |
      這類資料雖然包含多個欄位，但每個欄位大小固定 或 變動幅度很小，Slotted Page 的彈性管理優勢不明顯，使用簡單結構即可有效儲存。  

  - text: "**用戶登入紀錄**，例如每次登入的時間戳 與 使用者 ID。"  
    explanation: |
      這類資料以固定長度欄位為主，且通常以 append-only 方式寫入，Slotted Page 的 slot table 彈性管理並不會帶來明顯好處。