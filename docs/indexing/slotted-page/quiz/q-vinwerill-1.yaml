author: vinwerill  
date: 2026-04-01  
question: |
  在設計資料庫的 page layout 時，工程師需要根據資料特性選擇合適的儲存結構。Slotted Page 是一種常見的頁面內資料管理方式。請問在以下情境中，哪一種最適合使用 Slotted Page？  
options:  
  - text: "**商品描述 或 使用者備註**，通常是可變長文字欄位。"  
    correct: true  
    explanation: |
      Slotted Page 透過 slot table 管理每個記錄的起始位置與長度，非常適合這類變長欄位資料。它能有效利用頁面空間，避免內部碎片，並方便在頁面內進行插入、刪除 或 更新操作。  

  - text: "**訂單編號 或 會員 ID**，固定長度整數欄位。"  
    explanation: |
      這類固定長度欄位資料可直接用連續陣列儲存，不需要 slot table 管理，因此使用 Slotted Page 的效益不大。  

  - text: "**產品規格 或 價格列表**，欄位長度為變長但變動幅度不大，因此使用固定長度配置也不會造成明顯空間浪費。"  
    explanation: |
      當欄位雖為 variable length，但實際長度差異很小時，可以用固定長度配置簡化設計，且不會造成顯著的空間浪費，因此 Slotted Page 的優勢有限。  

  - text: "**訂單建立日期 或 出貨日期**，固定長度的日期欄位格式。"  
    explanation: |
      這類日期資料通常為固定長度欄位，例如 timestamp 或 date type，可直接以規則排列方式儲存，不需要 Slotted Page 的 slot table 來管理變動長度資料。