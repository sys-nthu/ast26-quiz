author: CasualBrave
date: 2026-04-03
question: |
  已知 HDD random I/O 約 10 ms（10000 us），NVMe random read 約 100 us，
  而一次 context switch 約 1-5 us。下列哪個敘述最能同時解釋：
  1) 為何 HDD 時代常見 synchronous I/O；
  2) 為何在 NVMe 時代更需要 asynchronous I/O？
options:
  - text: "HDD 時代也可以用 asynchronous I/O，但在 HDD 上裝置等待時間遠大於 thread 管理成本，
      synchronous I/O 的額外管理成本通常不顯著；到 NVMe 時代後，I/O 延遲下降，
      scheduler 與 context switch 的相對成本上升，
      因此更需要 asynchronous I/O 來降低 blocking 與 thread 管理開銷。"
    correct: true
    explanation: |
      核心是成本占比。HDD 下 random I/O 約 10000 us，而 context switch 只有
      1-5 us，主要瓶頸在裝置等待；但 NVMe 下 random read 約 100 us，同樣的
      scheduler 與 context switch 成本占比明顯提高。在高 IOPS 與大量 blocking threads 的場景，
      asynchronous I/O 更能降低 CPU 浪費。
  - text: "NVMe 時代更強調 asynchronous I/O 的主因是 NVMe bandwidth 遠高於 HDD；
      只要 bandwidth 夠高，就必然需要 asynchronous I/O
      ，與 context switch 成本無關。"
    explanation: |
      這混淆了 bandwidth 與 IOPS/latency 問題。這題關鍵是單次 I/O 延遲下降後，
      blocking 與 context switch 的相對成本變大，而不是「bandwidth 高就一定要 async」。
  - text: "NVMe，之所以更需要 asynchronous I/O，主要是因為 NVMe bandwidth
      更高，必須用 asynchronous I/O 才能把頻寬吃滿。"
    explanation: |
      這個說法的錯誤在於把主因歸到 bandwidth。關鍵是 NVMe 的單次 I/O
      延遲下降後，blocking 與 context switch 的相對成本提高；因此更需要
      asynchronous I/O 來降低 thread 管理開銷。也就是說，核心不是「bandwidth 高」，
      而是「延遲低時管理成本占比變大」。
  - text: "HDD 時代常見 synchronous I/O 的真正原因是 HDD 可以直接把資料放進 CPU cache，
      所以 thread 不會被 block；NVMe 則因為 cache 機制不同才改用 asynchronous I/O。"
    explanation: |
      這是錯誤敘述。I/O 是否 block thread 與 synchronous/asynchronous model 有關，不是由
      「HDD 直接放進 CPU cache」決定。該說法無法解釋題目中的延遲與成本占比差異。
