author: SJieNg123
date: 2026-04-05
question: |
  在 NTHU 的高性能儲存系統課程中，老師介紹了 Linux 最新一代的非同步 I/O 介面：io_uring。
  假設你正在開發一個類似 RocksDB 的儲存引擎，並打算將原本基於多執行緒的 Synchronous I/O (read/write) 遷移至 io_uring。
  下列關於這項技術轉換的敘述，何者「正確」？
options:
  - text: "io_uring 僅能支援帶有 O_DIRECT 標籤的檔案存取（繞過 Page Cache），若檔案位於 Page Cache 中，它會退化成同步阻塞模式。"
    explanation: |
      錯誤。這是舊版 Linux AIO (libaio) 的主要限制。io_uring 的一大突破就是它能處理包括 Buffered I/O 在內的幾乎所有系統呼叫，且能真正實現非同步執行。
  - text: "io_uring 透過 Submission Queue (SQ) 與 Completion Queue (CQ) 實現 User 與 Kernel 空間的記憶體共享，能有效減少頻繁系統呼叫帶來的 Context Switch 開銷。"
    correct: true
    explanation: |
      正確。這是 io_uring 的核心設計。透過與核心共享 Ring Buffer，應用程式可以批次提交請求，甚至在開啟 SQPolling 模式下，不需要執行 syscall 就能讓核心處理 I/O。
  - text: "改用 io_uring 後，由於 CPU 不再需要等待 I/O 完成，因此單一 I/O 請求從發出到完成的絕對延遲 (Latency) 會比同步 I/O 大幅縮短。"
    explanation: |
      錯誤。Async I/O 的優勢在於提高「吞吐量 (Throughput)」與 CPU 利用率。單次請求的硬體存取時間是不變的，且因為增加了隊列管理開銷，單次延遲通常與同步 I/O 持平。
  - text: "在 io_uring 架構下，為了確保資料正確寫入，系統必須強迫使用 Interrupt-driven 模式來得知 I/O 完成，而不能使用 Polling，以免浪費 CPU 資源。"
    explanation: |
      錯誤。io_uring 支持 I/O Polling 模式（如 `IORING_SETUP_IOPOLL`），對於極高性能的 NVMe SSD，使用 Polling 繞過中斷處理的開銷，反而能獲得更低的延遲與更高的效能。
