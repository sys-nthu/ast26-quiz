author: CasualBrave
date: 2026-04-03
question: |
  為何在缺乏 IOMMU 或 DMA 存取控制時，DMA 可能帶來安全風險，例如： DMA 遊戲外掛？
options:
  - text: "因為 DMA 裝置可直接對記憶體做讀寫；若缺乏隔離與權限管控，可能讀到或覆寫不該存取的記憶體區域。"
    correct: true
    explanation: |
      這是核心原因。DMA 直接對記憶體搬運資料，若沒有 IOMMU 或適當的 DMA
      存取控制，裝置可能越權存取敏感記憶體，造成資料外洩、資料毀損，甚至
      系統穩定性問題。
  - text: "因為 DMA 一定會繞過 CPU 的所有控制邏輯，所以 CPU 完全無法得知任何 DMA 行為。"
    explanation: |
      DMA 不是完全脫離 CPU。CPU/driver 仍會參與 setup 與 completion handling。
      風險重點在於記憶體存取隔離不足，而不是 CPU 完全看不到 DMA。
  - text: "因為 DMA 只能使用 virtual address，導致位址映射混亂，才會產生安全問題。"
    explanation: |
      DMA 常見使用的是 physical address（或經 IOMMU 轉換後位址），不是只能用
      virtual address。安全風險來源是存取範圍控制不足，不是位址型別本身。
  - text: "因為 DMA 一定需要 physically contiguous 記憶體，只要記憶體碎片化就會直接造成資安漏洞。"
    explanation: |
      記憶體是否連續屬於可用性與效能問題，且可透過 scatter-gather 緩解；這不是
      DMA 安全風險的根本原因。根本仍是是否有正確的存取隔離與權限控管。
