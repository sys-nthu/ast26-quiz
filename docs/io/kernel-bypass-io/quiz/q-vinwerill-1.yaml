author: vinwerill
date: 2026-04-01
question: |
  在採用類似 CSAL（Cloud Storage Acceleration Layer）的架構時，系統設計者考慮將部分 FTL（Flash Translation Layer）的功能由 SSD controller 上移至 Host 端。

  請問在以下四種理由中，哪一個最能解釋「為何要將 FTL 的部分功能從 SSD 移到 Host」？
options:
  - text: "**雲端儲存系統** 在 Host 端先收集 small random writes，整理成 large sequential I/O，再寫入 SSD，以降低 write amplification 並提升效能與壽命。"
    correct: true
    explanation: |
      Host 可以先吸收零碎的隨機寫入，並合併成連續的大型寫入再送到 SSD。
      這樣可以減少寫入放大與 GC 壓力，特別適合 QLC SSD。

  - text: "**資料庫系統** 將 FTL 移到 Host 後，可以完全不需要 SSD 的 garbage collection。"
    explanation: |
      SSD 仍然需要進行 garbage collection。
      Host 只能改善寫入模式，無法消除 GC。

  - text: "**備份系統** 將 FTL 移到 Host 後，所有寫入都會自動變成 sequential，因此不需要任何額外處理。"
    explanation: |
      寫入是否為 sequential 取決於 workload。
      Host 需要主動進行整理與合併，並不會自動變成 sequential。

  - text: "**物件儲存系統** 將 FTL 移到 Host 可以讓 SSD 自動加快讀取速度，提升整體 I/O throughput。"
    explanation: |
      FTL 上移到 Host 的主要目的是改善寫入模式與資料管理，而非自動加快 SSD 讀取速度。
      SSD 的讀取性能仍取決於硬體與內部控制器，Host 端的 FTL 功能無法直接提升讀取 throughput。