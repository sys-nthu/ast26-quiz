author: chiajungchang2003
date: 2026-04-03
question: |
  在 DuckDB 的整合中，為什麼「執行緒擁有的 NVMe 佇列」策略能成功恢復最初被基本非同步 I/O 實作所破壞的正確性保證？

options:
  - text: "它確保每個任務在其特定的區塊 I/O 提交後立即執行佇列排空（drain），防止相依任務在先前任務的 I/O 實體完成前就開始執行"
    correct: true
    explanation: |
      DuckDB 負責管理任務相依性（例如：任務 2 僅在任務 1「完成」後開始）。在基本的非同步 I/O 設定中，任務 1 一提交命令就會被標記為「完成」，即使 SSD 尚未完成資料寫入
      。如果任務 2 隨後讀取同一區塊，可能會讀到舊資料（競爭條件）。透過在任務 1 結束時使用佇列排空（queue draining），執行緒會強迫 I/O 在實體上完成，然後才將任務 1 標記為結束，從而恢復了正確性契約
  - text: "它使用全域互斥鎖（mutex）來確保在任何給定時間，所有可用佇列中只有一個執行緒可以提交 I/O 任務。"
    explanation: |
      全域互斥鎖雖能恢復佇列本身的執行緒安全，但無法解決任務 2 在任務 1 的硬體操作完成前就開始的邏輯問題
  - text: "它透過停用控制器的內部排程器，強迫 SSD 嚴格按照命令放入提交佇列的順序來處理命令。"
    explanation: |
      NVMe 控制器的內部排程器為了效能會亂序處理命令，軟體無法輕易停用它，而排空佇列是確保完成的標準做法
  - text: "它利用 Linux NVMe 直通（passthrough）驅動程式來完全繞過區塊層的 I/O 排程器。"
    explanation: |
      NVMe 直通是一種傳輸機制，雖繞過了核心層，但其本身並不具備管理應用程式層級任務相依性的功能
