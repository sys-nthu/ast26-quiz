author: xian6060
date: 2026-05-10
question: |
  假設小明有 4 顆容量皆為 B 的硬碟，想組成 RAID 系統並計算系統的可用總容量和容錯能力，請問下列敘述何者錯誤？
options:
  - text: "若小明想組成 RAID-0 系統，那可用總容量是 4B ，能容忍的故障數量是 0 顆"
    explanation: |
      RAID-0 將資料分散寫入所有硬碟以追求最高讀寫效能，但完全沒有 Redundancy 機制。
      4 顆硬碟的容量可完全合併使用，但只要有任何 1 顆硬碟損壞，整個陣列的資料就會全部遺失。
  - text: "若小明想組成 RAID-1 (兩組鏡像對) 系統，那可用總容量是 3B ，能容忍的故障數量是 1 顆"
    correct: true
    explanation: |
      在 4 顆硬碟的架構下，通常會配置為兩組互為鏡像的磁碟對。總容量必須除以 2，因此可用容量為 2B 。
      在最幸運的情況下（壞掉的 2 顆硬碟剛好分屬「不同」的鏡像群組），系統仍能運作；
      但如果是同一個鏡像群組內的 2 顆硬碟同時損壞，資料就會遺失。因此，在「能保證」的前提下，它只能保證容忍 1 顆硬碟故障。
  - text: "若小明想組成 RAID-4 系統，那可用總容量是 3B ，能容忍的故障數量是 1 顆"
    explanation: |
      RAID-4 會將其中 1 顆硬碟完全獨立出來，專門用來儲存 Parity 資料，剩下的 3 顆硬碟用來存儲實際資料。
      當任何 1 顆硬碟損壞時，可以透過剩下的 3 顆硬碟利用 XOR 運算將資料反推出來。
  - text: "若小明想組成 RAID-5 系統，那可用總容量是 3B ，能容忍的故障數量是 1 顆"
    explanation: |
      RAID-5 不會將 Parity 資料集中在單一硬碟，而是平均打散分配到所有的 4 顆硬碟中。
      雖然 Parity 資料是分散的，但整體佔用的空間仍相當於 1 顆硬碟的容量，同樣能透過 XOR 反推，容忍任何 1 顆硬碟發生故障。
      
