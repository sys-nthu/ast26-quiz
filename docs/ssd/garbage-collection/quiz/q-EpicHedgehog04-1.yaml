author: EpicHedgehog04
date: 2026-04-02
question: |  
  在一個採用 NAND flash 的 SSD 中，考慮以下系統設計：
  - 採用 page-level mapping FTL
  - 使用 out-of-place write
  - 不實作任何形式的 garbage collection（GC）
  - 初始時所有 blocks 均為 free
  - workload 為持續的 random write

  假設系統擁有足夠大的 mapping table（即 mapping 並非瓶頸），且 controller 不進行任何背景資料整理。
請問在上述條件下，隨著時間推進，系統最終會出現何種現象？
options:
  - text: 因為 invalid pages 會隨寫入操作逐漸累積，最終耗盡可用空間
    correct: true
    explanation: |
      因為採用 out-of-place write ，在寫入過程中舊資料會變成 invalid 。
      隨著 invalid 的資料越來越多， free pages 也就越來越少，在沒有 garbage colloection 處理的狀況>下 free pages 總有一天會變成 0 ，最終沒有可以使用的空間。
  - text: 系統可持續運作，但 write latency 逐漸上升
    explanation: |
      在有 garbage collection 的情況下是對的。
      但因為題目提到沒有 garbage colloection ，因此不會出現 erase block 、搬資料或 latency 逐漸變慢
，而是最後直接寫不進去
  - text: 因為 mapping table 規模會隨時間膨脹，必須透過 GC 壓縮
    explanation: |
      mapping table 確實會變大，錯誤是在後半句話：
      GC 的目的是回收空間，而不是壓縮 mapping table 。
  - text: 因為 erase 操作延遲過高，必須透過 GC 分攤成本
    explanation: |
      首先，沒有 GC 就沒有 erase ，所以不會有 erase 延遲的問題；另外， erase 慢確實是一個問題，但這
不是 GC 被觸發的原因
