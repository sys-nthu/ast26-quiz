author: minniewei
date: 2026-04-02
question: |
  在 SSD frimware 設計中，關於區分 Hot Page (更新頻繁) 與 Cold Page (更新較少) 的機制及其對 GC 的影響，下列敘述何者最為正確？
options:
  - text: "利用 Multi-level Queues 或 Counter 監控 LBA 的更新頻率，將 Hot Page 集中存放
    correct: true
    explanation: |
      SSD controller 通常會透過 Multi-level Queues 或 Counter 來監控每個 LBA 的更新頻率，將 Hot Page 集中存放在特定的區塊中。這樣在 GC 時，Hot Blocks 可能很快累積 invalid pages，使 GC 在回收時需要搬移的 valid pages 減少，從而降低 write amplification。
  - text: "只要 OS 發送了 TRIM 指令，Controller 就不再需要任何算法來區分 Hot/Cold Data。"
    explanation: |
      TRIM 的作用是告訴 SSD 哪些 LBA 上的資料已經被刪除，對應的 physical page 可以被標記為 invalid，這確實有助於降低 write amplification。但 Hot/Cold separation 的機制主要是為了在 GC 時減少需要搬移的 valid data 數量，TRIM 並不能完全取代這種機制。
  - text: "控制器主要透過 Read Count 來定義 Hot Page，因為讀取次數越多的資料越容易發生錯誤，需要優先回收"
    explanation: |
      在 GC 的情境下，Hot/Cold **是指**「更新（寫入）頻率」**。
  - text: "將不同冷熱程度的資料混合存放在同一個 Block 中，可以平衡磨損並降低 WAF"
    explanation: |
      將 Hot Data 與 Cold Data 混在同一個 block 中，Hot Data 可能很快被覆寫而變成 invalid，但 Cold Data 仍然保持 valid。當 GC 回收該 block 時，controller 必須複製這些仍然有效的 Cold Pages，增加資料搬移量，導致 write amplification 上升。
