author: SJieNg123
date: '2026-04-05'
question: |
  A同學是一位熱愛《魔物獵人》與《艾爾登法環》的資深玩家。他計畫購買一顆 2 TB 的 SSD 作為「遊戲專用碟」，主要用途是安裝遊戲大作（一次寫入後多次讀取）以及加速遊戲啟動讀取時間。
  
  考慮到遊戲場景對「讀取速度」要求高、對「寫入壽命」要求相對適中（非伺服器 24/7 寫入），且有預算考量。根據講義對 NAND Flash 特性的分析，下列哪項決策最符合他的需求？
options:
  - text: "選購 SLC (Single-Level Cell) SSD，因為它的 P/E cycle 最高且讀寫延遲最低，能提供最極致的遊戲加載速度。"
    explanation: |
      錯誤。雖然 SLC 性能最強，但其儲存密度最低（1 bit/cell），導致相同容量下的成本極其昂貴。對於「遊戲專用碟」這種大容量需求，SLC 並不具備經濟效益，且遊戲主要是讀取操作，SLC 的超高寫入耐用度在該場景下屬於效能過剩。
  - text: "選購 QLC (Quad-Level Cell) SSD，因為 QLC 的儲存密度最高，能在有限預算內買到最大容量，且其讀取性能足以應付遊戲加載。"
    correct: true
    explanation: |
      正確。遊戲場景屬於「Read-intensive (讀取密集型)」。QLC 雖然寫入壽命（P/E cycle）與寫入速度較慢，但讀取延遲與 TLC 差距不大。對於預算有限、需要大容量存放多款遊戲、且寫入頻率不高的玩家來說，QLC 是性價比最高的選擇。
  - text: "選購 TLC (Triple-Level Cell) SSD，並將其作為系統槽與遊戲槽混合使用，因為 TLC 只有 2 個電壓狀態，判定速度比 QLC 快得多。"
    explanation: |
      錯誤。描述中有技術錯誤：TLC 每個 cell 儲存 3 bits，因此有 8 個（2^3）電壓狀態，而非 2 個（那是 SLC）。雖然 TLC 是目前市場主流，但該選項的技術描述不正確。
  - text: "選購 QLC SSD，因為 QLC 每個 cell 有 16 個電壓狀態，這代表它在進行資料讀取（Read）時的判定電壓寬容度比 SLC 更高、更不容易出錯。"
    explanation: |
      錯誤。事實正好相反。QLC 因為要在同樣的電壓區間內切分出 16 個狀態，狀態間的電壓差（Margin）極小。這導致讀取時對電壓判定的精準度要求極高，出錯率（Bit Error Rate）反而比 SLC 或 TLC 更高，需要更強的 ECC 糾錯。
