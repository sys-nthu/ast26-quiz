author: SJieNg123
date: '2026-04-05'
question: |
question: |
  A 同學是一位熱愛《 魔物獵人 》與《 艾爾登法環 》的資深玩家。他計畫購買一顆 2 TB 的 SSD 作為「遊戲專用碟」，主要用途是安裝大型 3A 遊戲（ 一次寫入後多次讀取 ）並追求極速的遊戲啟動與地圖加載時間。
  
  考慮到遊戲場景對於「讀取延遲 (Read Latency)」極為敏感，且須兼顧長期使用的寫入壽命。根據講義對不同 NAND Flash 特性的分析，下列哪項決策最符合他的需求？
options:
  - text: "選購 TLC ( Triple-Level Cell ) SSD。因為 TLC 的讀取延遲（ 約 50-75 μs ）明顯優於 QLC（ 100+ μs ），且其 P/E cycle（ 約 3,000 ）足以應付頻繁的遊戲更新與存檔需求。"
    correct: true
    explanation: |
      正確。根據講義，TLC 在讀取速度上具有顯著優勢，這對於縮短遊戲加載時間至關重要。同時，TLC 的耐用度與價格在消費級市場中達到了最佳平衡，是目前高性能遊戲碟的首選。
  - text: "選購 SLC ( Single-Level Cell ) SSD。因為 SLC 只有 2 個電壓狀態，雖然讀取延遲最低，但其儲存密度高，能以最低廉的成本提供 2 TB 的大容量。"
    explanation: |
      錯誤。描述中有技術錯誤：SLC 的儲存密度是最低的（ 1 bit/cell ），這導致其單位容量成本極高。雖然效能最強，但對於需要大空間的遊戲碟來說，SLC 並不具備經濟效益。
  - text: "選購 QLC ( Quad-Level Cell ) SSD。因為 QLC 每個 cell 有 16 個電壓狀態，這代表它在讀取資料時所需的判定時間比 TLC 更短，能提供更快的遊戲加載速度。"
    explanation: |
      錯誤。事實正好相反。QLC 因為需要精確判定 16 種電壓狀態，其讀取延遲（ 100+ μs ）是所有類型中最慢的，這會導致遊戲加載時間明顯增加。
  - text: "選購 QLC SSD。因為 QLC 的寫入壽命 ( P/E cycle ) 通常高達 10,000 次以上，遠超 TLC，非常適合需要頻繁安裝與解安裝遊戲的玩家。"
    explanation: |
      錯誤。描述中有技術錯誤：QLC 的 P/E cycle 通常僅約 1,000 次左右，是所有類型中壽命最低的。頻繁的寫入操作反而會讓 QLC SSD 提早達到壽命終點。
