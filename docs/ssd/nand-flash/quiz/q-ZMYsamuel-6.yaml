author: ZMYsamuel
date: 2026-03-31
question: |
  在大量且密集的寫入 Workload 下，SSD 的 Read Request 經常會面臨極長的 Tail Latency（可能高達數毫秒）。結合課程與 SSD 效能分析論文（如 SSD-iq），下列何者是導致此 Tail Latency 飆高的最主要硬體與底層機制原因？
options:
  - text: "NAND Flash 的 Erase 操作耗時高達數毫秒，遠大於 Read 操作。若 Read Request 被分配到正在執行 Garbage Collection 中 Erase 任務的 Flash Die 上，就會發生 Head-of-Line Blocking，必須等待 Erase 完成才能被處理。"
    correct: true
    explanation: |
      這是 SSD Tail Latency 的最核心原因。NAND Flash 晶片的 Read 操作大約只需數十微秒，Program 需數百微秒，而 Erase 則長達數毫秒。在大量寫入時，背景的 Garbage Collection 會頻繁發出 Erase 指令。由於同一個 Flash Die 同一時間只能執行一個操作，一旦 Read 請求與 Erase 操作在同一個 Die 發生衝突，Read 就必須在佇列中等待數毫秒，造成嚴重的 Tail Latency。
  - text: "大量的寫入會導致 FTL 內部的 L2P Mapping Table 頻繁發生 Cache Miss，SSD Controller 必須花費數毫秒的時間從 NAND Flash 中重新讀取 Mapping 資訊到 DRAM 中，這拖慢了位址轉換速度。"
    explanation: |
      這個選項是對現代 SSD 架構的誤解。現代中高階 SSD 會配置足夠容量的 DRAM（通常比例為 1GB DRAM 對應 1TB 容量），用以將完整的 L2P Mapping Table 快取在記憶體中。即使發生少數 Cache Miss，讀取 Flash Page 的時間也僅在百微秒等級，不會產生高達數毫秒的延遲突波。
  - text: "Host 端的 I/O Scheduler 為了維持整體系統的 Write Bandwidth，在偵測到大量寫入時會主動暫停並阻塞所有的 Read Request，直到 SSD 內部的 Write Buffer 完全清空為止。"
    explanation: |
      這不符合一般的系統設計邏輯。在 Host 端，Read Request 通常是 Blocking 的（會卡住應用程式的執行緒），而 Write 多半可以非同步寫入 Buffer。因此作業系統與 Scheduler 通常會優先處理 Read 請求以降低應用程式延遲，不可能為清空 Write Buffer 而刻意長期餓死（Starve）Read Request。
  - text: "頻繁的寫入會讓 Flash Cell 的 Wear-leveling 快速達到極限，Controller 為了避免硬體損毀，會強制暫停所有 I/O 請求，並進行全碟範圍的 Block 搬移與資料重組（Defragmentation）。"
    explanation: |
      Wear-leveling 是一項非同步的背景操作，Controller 會巧妙地將搬移操作分散在 SSD 整個生命週期的閒置時間進行，絕不會因為密集的寫入就觸發「全碟範圍、強制暫停所有 I/O」的停機狀態。
