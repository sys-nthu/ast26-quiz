author: chiajungchang2003
date: 2026-04-03
question: |
  關於 **軟判決解碼 (LDPC Soft-Decision)** 的延遲特性及其優化手段，下列敘述何者正確？
options:
  - text: "軟判決解碼需要多次電壓感測以獲取對數似然比 (LLR)，但可透過流水線化感測與控制器解碼來隱藏部分延遲。"
    correct: true
    explanation: |
      硬判決僅需一次感測，而軟判決需多次參考電壓感測以估計 Cell 狀態。論文提出將感測與解碼流程流水線化 (pipelining)，在硬判決進行時即預先啟動軟判決感測，若硬判決失敗則可直接利用已感測數據，縮短總處理時間。
  - text: "硬判決解碼較慢，因為它必須在讀取任何位元之前估計整個通道分佈。"
    explanation: |
      硬判決解碼傳播的是離散狀態 (0 或 1)，速度通常比需要複雜計算與多次感測的軟判決解碼更快。
  - text: "流水線化對 LDPC 無效，因為控制器必須等待硬判決失敗後才能啟動軟判決感測。"
    explanation: |
      這是傳統做法的缺點。論文正是提倡「不等待失敗」即啟動感測，以利用並發性來優化延遲。
  - text: "軟判決解碼使用 BCH 碼，比 LDPC 需要更多的校驗矩陣計算。"
    explanation: |
      解碼技術分類錯誤。LDPC 與 BCH 是兩種不同的編碼。軟判決通常與 LDPC 結合以接近香農極限。