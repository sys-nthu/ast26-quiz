author: ianlin12
date: 2026-04-04
question: |
  對 NAND Flash 來說，會降低 Data Retention 的最主要的原因是什麼？
options:
  - text: "NAND Flash表面沾到灰塵"
    explanation: |
      表面有灰塵只要清理掉就好，並不會影響到內部的電子儲存
  - text: "使用了能夠減少 P/E cycle 消耗的設計方式"
    explanation: |
      減少 P/E cycle 消耗可以增加 Data Retention
  - text: "電荷經由隧穿氧化層（tunnel oxide）洩漏"
    correct: true
    explanation: |
      每次 erase 操作都會對 cell 的隧穿氧化層（tunnel oxide）造成微小但不可逆的損傷。隨著 P/E cycle 累積，氧化層變薄，
      其保留電子的能力下降，使 Data Retention 變差
  - text: "使用 in-place write"
    explanation: |
      NAND Flash 只能 out-of-place write
